<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - S.I.N.C.R.O. Talent Forge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;600;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #00f5d4 0%, #00bbf9 50%, #fee440 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .debug-box {
            background: #1e293b;
            border: 2px solid #ef4444;
            color: #fecaca;
            padding: 16px;
            margin: 10px 0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    
    <!-- DEBUG CONSOLE VISIVA -->
    <div id="debugConsole" class="fixed top-20 right-4 w-96 z-50 hidden">
        <div class="glass-panel p-4 rounded-xl border border-red-500/50">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-red-400 font-bold text-sm">🔴 DEBUG CONSOLE</h3>
                <button onclick="document.getElementById('debugConsole').classList.add('hidden')" class="text-slate-400 hover:text-white">✕</button>
            </div>
            <div id="debugOutput" class="text-xs font-mono text-slate-300 max-h-64 overflow-y-auto"></div>
        </div>
    </div>

    <!-- Header -->
    <nav class="glass-panel border-b border-slate-700/50 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center">
                        <i data-lucide="activity" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="font-display font-bold text-xl">S.I.N.C.R.O. <span class="text-cyan-400">ADMIN</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleDebug()" class="px-3 py-1 bg-red-500/20 text-red-400 rounded text-xs hover:bg-red-500/30">
                        DEBUG
                    </button>
                    <button onclick="showSection('approvazioni')" class="relative p-2 text-slate-400 hover:text-white">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span id="badgeApprovazioni" class="absolute top-0 right-0 w-4 h-4 bg-red-500 rounded-full text-xs flex items-center justify-center hidden">0</span>
                    </button>
                    <span class="text-sm text-slate-400">Amministratore</span>
                    <button onclick="logout()" class="text-red-400 hover:text-red-300 text-sm flex items-center gap-1">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- Stats Overview -->
        <div class="grid md:grid-cols-4 gap-6 mb-8">
            <div class="glass-panel p-6 rounded-2xl border border-cyan-500/30">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-400 text-sm">Totale Giocatori</span>
                    <i data-lucide="users" class="w-5 h-5 text-cyan-400"></i>
                </div>
                <div class="text-3xl font-bold font-display" id="statTotalPlayers">0</div>
            </div>
            
            <div class="glass-panel p-6 rounded-2xl border border-purple-500/30">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-400 text-sm">Valutazioni Oggi</span>
                    <i data-lucide="clipboard-check" class="w-5 h-5 text-purple-400"></i>
                </div>
                <div class="text-3xl font-bold font-display" id="statTodayEvals">0</div>
            </div>
            
            <div class="glass-panel p-6 rounded-2xl border border-green-500/30">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-400 text-sm">Staff Attivo</span>
                    <i data-lucide="user-check" class="w-5 h-5 text-green-400"></i>
                </div>
                <div class="text-3xl font-bold font-display" id="statActiveStaff">0</div>
            </div>
            
            <div class="glass-panel p-6 rounded-2xl border border-yellow-500/30">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-400 text-sm">In Attesa</span>
                    <i data-lucide="clock" class="w-5 h-5 text-yellow-400"></i>
                </div>
                <div class="text-3xl font-bold font-display" id="statPending">0</div>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex gap-2 mb-8 overflow-x-auto pb-2">
            <button onclick="showSection('dashboard')" id="nav-dashboard" class="px-6 py-3 rounded-full bg-cyan-500/20 text-cyan-400 font-semibold whitespace-nowrap">
                Dashboard Giocatori
            </button>
            <button onclick="showSection('dettaglio')" id="nav-dettaglio" class="px-6 py-3 rounded-full bg-slate-800 text-slate-400 font-semibold whitespace-nowrap hover:text-white">
                Analisi Dettaglio
            </button>
            <button onclick="showSection('approvazioni')" id="nav-approvazioni" class="px-6 py-3 rounded-full bg-slate-800 text-slate-400 font-semibold whitespace-nowrap hover:text-white">
                Approvazioni Staff
            </button>
            <button onclick="showSection('database')" id="nav-database" class="px-6 py-3 rounded-full bg-slate-800 text-slate-400 font-semibold whitespace-nowrap hover:text-white">
                Gestione Database
            </button>
        </div>

        <!-- SECTION: Dashboard Giocatori -->
        <div id="section-dashboard" class="space-y-6">
            
            <!-- DEBUG INFO -->
            <div id="debugInfo" class="hidden">
                <div class="glass-panel p-4 rounded-xl border border-yellow-500/30 mb-4">
                    <h3 class="text-yellow-400 font-bold mb-2">Informazioni Debug</h3>
                    <div id="debugContent" class="text-sm text-slate-300 font-mono"></div>
                </div>
            </div>

            <!-- Filters -->
            <div class="glass-panel p-4 rounded-2xl border border-slate-700 flex gap-4 flex-wrap">
                <select id="filterCat" onchange="loadPlayers()" class="px-4 py-2 bg-slate-800 rounded-lg text-white border border-slate-600">
                    <option value="">Tutte le categorie</option>
                    <option value="E1">Esordienti 1°</option>
                    <option value="E2">Esordienti 2°</option>
                    <option value="G1">Giovanissimi 1°</option>
                </select>
                <select id="filterRuolo" onchange="loadPlayers()" class="px-4 py-2 bg-slate-800 rounded-lg text-white border border-slate-600">
                    <option value="">Tutti i ruoli</option>
                    <option value="Portiere">Portiere</option>
                    <option value="Difensore">Difensore</option>
                    <option value="Centrocampista">Centrocampista</option>
                    <option value="Attaccante">Attaccante</option>
                </select>
                <input type="text" id="searchPlayer" placeholder="Cerca giocatore..." onkeyup="loadPlayers()"
                    class="px-4 py-2 bg-slate-800 rounded-lg text-white border border-slate-600 flex-1 min-w-[200px]">
                <button onclick="forceReload()" class="px-4 py-2 bg-cyan-500/20 text-cyan-400 rounded-lg hover:bg-cyan-500/30">
                    🔄 Ricarica
                </button>
            </div>

            <!-- Players Grid -->
            <div id="playersGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-3 text-center py-12 text-slate-500">
                    Caricamento giocatori...
                </div>
            </div>
        </div>

        <!-- ALTRE SEZIONI (simplified per brevità) -->
        <div id="section-dettaglio" class="hidden"><div class="glass-panel p-8 text-center text-slate-400">Seleziona un giocatore dalla dashboard</div></div>
        <div id="section-approvazioni" class="hidden"><div class="glass-panel p-8 text-center text-slate-400">Nessuna richiesta pendente</div></div>
        <div id="section-database" class="hidden">
            <div class="glass-panel p-6 rounded-2xl border border-slate-700">
                <h3 class="font-semibold mb-4">Aggiungi Nuovo Giocatore</h3>
                <form id="addPlayerForm" class="grid md:grid-cols-2 gap-4">
                    <input type="text" id="newNome" placeholder="Nome" required class="px-4 py-2 bg-slate-800 rounded-lg border border-slate-600 text-white">
                    <input type="text" id="newCognome" placeholder="Cognome" required class="px-4 py-2 bg-slate-800 rounded-lg border border-slate-600 text-white">
                    <input type="date" id="newDataNascita" required class="px-4 py-2 bg-slate-800 rounded-lg border border-slate-600 text-white">
                    <select id="newCategoria" required class="px-4 py-2 bg-slate-800 rounded-lg border border-slate-600 text-white">
                        <option value="">Categoria</option>
                        <option value="E1">Esordienti 1°</option>
                        <option value="E2">Esordienti 2°</option>
                        <option value="G1">Giovanissimi 1°</option>
                    </select>
                    <select id="newRuolo" required class="px-4 py-2 bg-slate-800 rounded-lg border border-slate-600 text-white">
                        <option value="">Ruolo</option>
                        <option value="Portiere">Portiere</option>
                        <option value="Difensore">Difensore</option>
                        <option value="Centrocampista">Centrocampista</option>
                        <option value="Attaccante">Attaccante</option>
                    </select>
                    <button type="submit" class="px-4 py-2 bg-cyan-500 text-slate-900 rounded-lg font-bold hover:bg-cyan-400">
                        Aggiungi Giocatore
                    </button>
                </form>
            </div>
        </div>

    </div>

    <script>
        // DEBUG FUNCTION
        function log(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const line = `[${timestamp}] ${msg}`;
            console.log(line);
            
            const debugOutput = document.getElementById('debugOutput');
            if (debugOutput) {
                const div = document.createElement('div');
                div.className = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-green-400' : 'text-slate-300');
                div.textContent = line;
                debugOutput.appendChild(div);
                debugOutput.scrollTop = debugOutput.scrollHeight;
            }
        }

        function toggleDebug() {
            const el = document.getElementById('debugConsole');
            el.classList.toggle('hidden');
        }

        function showDebugInfo(html) {
            document.getElementById('debugInfo').classList.remove('hidden');
            document.getElementById('debugContent').innerHTML = html;
        }

        // 🔥 CONFIGURAZIONE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAlksSPuBgbYgzZmtUk3jYJMMtXEBCgM94",
            authDomain: "sincro-academy.firebaseapp.com",
            projectId: "sincro-academy",
            storageBucket: "sincro-academy.firebasestorage.app",
            messagingSenderId: "139698272933",
            appId: "1:139698272933:web:c4307e00b69757766beb4c",
            measurementId: "G-CD4QB2ZXRS"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            log('Firebase inizializzato correttamente', 'success');
        } catch (e) {
            log('ERRORE Firebase init: ' + e.message, 'error');
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allPlayers = [];

        auth.onAuthStateChanged(async (user) => {
            log('Auth state changed: ' + (user ? user.uid : 'null'));
            
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                log('User doc exists: ' + userDoc.exists);
                
                if (!userDoc.exists || userDoc.data().role !== 'admin') {
                    alert('Accesso riservato solo agli amministratori');
                    await auth.signOut();
                    window.location.href = 'login.html';
                    return;
                }
                
                currentUser = user;
                log('Admin autenticato: ' + user.email);
                
                await loadStats();
                await loadPlayers();
                
            } catch (error) {
                log('ERRORE auth: ' + error.message, 'error');
                console.error(error);
            }
        });

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }

        function showSection(section) {
            ['dashboard', 'dettaglio', 'approvazioni', 'database'].forEach(s => {
                document.getElementById(`section-${s}`).classList.add('hidden');
                document.getElementById(`nav-${s}`).classList.remove('bg-cyan-500/20', 'text-cyan-400');
                document.getElementById(`nav-${s}`).classList.add('bg-slate-800', 'text-slate-400');
            });
            
            document.getElementById(`section-${section}`).classList.remove('hidden');
            document.getElementById(`nav-${section}`).classList.remove('bg-slate-800', 'text-slate-400');
            document.getElementById(`nav-${section}`).classList.add('bg-cyan-500/20', 'text-cyan-400');
        }

        async function loadStats() {
            try {
                log('Caricamento statistiche...');
                const playersSnap = await db.collection('giocatori').get();
                document.getElementById('statTotalPlayers').textContent = playersSnap.size;
                log('Totale giocatori: ' + playersSnap.size, 'success');
                
                const today = new Date().toISOString().split('T')[0];
                const evalsSnap = await db.collection('valutazioni').where('data', '==', today).get();
                document.getElementById('statTodayEvals').textContent = evalsSnap.size;
                
                const staffSnap = await db.collection('users').where('approved', '==', true).get();
                document.getElementById('statActiveStaff').textContent = staffSnap.size;
                
                const pendingSnap = await db.collection('users').where('approved', '==', false).get();
                document.getElementById('statPending').textContent = pendingSnap.size;
                
            } catch (error) {
                log('ERRORE loadStats: ' + error.message, 'error');
            }
        }

        async function loadPlayers() {
            log('=== INIZIO loadPlayers() ===');
            
            const categoria = document.getElementById('filterCat').value;
            const ruolo = document.getElementById('filterRuolo').value;
            const search = document.getElementById('searchPlayer').value.toLowerCase().trim();
            
            log(`Filtri - Cat: "${categoria}", Ruolo: "${ruolo}", Search: "${search}"`);
            
            const grid = document.getElementById('playersGrid');
            
            try {
                // STEP 1: Carica tutti i giocatori
                log('Query Firebase: giocatori...');
                const snapshot = await db.collection('giocatori').get();
                log(`Query completata. Documenti trovati: ${snapshot.size}`, 'success');
                
                if (snapshot.empty) {
                    grid.innerHTML = '<div class="col-span-3 text-center py-12 text-slate-500">Nessun giocatore nel database</div>';
                    return;
                }
                
                // STEP 2: Converti in array
                allPlayers = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    log(`Giocatore: ${doc.id} -> ${JSON.stringify(data)}`);
                    allPlayers.push({
                        id: doc.id,
                        ...data
                    });
                });
                
                // STEP 3: Filtra
                let filtered = allPlayers.filter(p => {
                    if (categoria && p.categoria !== categoria) return false;
                    if (ruolo && p.ruolo !== ruolo) return false;
                    if (search) {
                        const fullName = `${p.nome || ''} ${p.cognome || ''}`.toLowerCase();
                        if (!fullName.includes(search)) return false;
                    }
                    return true;
                });
                
                log(`Dopo filtri: ${filtered.length} giocatori`);
                
                // STEP 4: Mostra debug info
                let debugHtml = `<strong>Giocatori trovati:</strong> ${allPlayers.length}<br>`;
                debugHtml += `<strong>Dopo filtri:</strong> ${filtered.length}<br><br>`;
                debugHtml += `<strong>Dettagli:</strong><br>`;
                allPlayers.forEach((p, i) => {
                    debugHtml += `${i+1}. ID:${p.id} | ${p.cognome || 'NO_COGNOME'} ${p.nome || 'NO_NOME'} | Cat:${p.categoria || 'N/D'} | Ruolo:${p.ruolo || 'N/D'}<br>`;
                });
                showDebugInfo(debugHtml);
                
                // STEP 5: Render
                grid.innerHTML = '';
                
                if (filtered.length === 0) {
                    grid.innerHTML = '<div class="col-span-3 text-center py-12 text-slate-500">Nessun giocatore corrisponde ai filtri</div>';
                    return;
                }
                
                for (const player of filtered) {
                    try {
                        log(`Rendering card per: ${player.cognome} ${player.nome}`);
                        
                        // Card semplificata senza query valutazioni per test
                        const card = document.createElement('div');
                        card.className = 'glass-panel p-6 rounded-2xl border border-slate-700 hover:border-cyan-500/50 cursor-pointer transition-all';
                        card.onclick = () => alert('Giocatore: ' + player.cognome + ' ' + player.nome);
                        
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-bold text-lg text-white">${player.cognome || 'Cognome?'} ${player.nome || 'Nome?'}</h3>
                                    <p class="text-sm text-slate-400">${player.categoria || 'N/D'} • ${player.ruolo || 'N/D'}</p>
                                </div>
                                <div class="text-xs bg-cyan-500/20 text-cyan-400 px-2 py-1 rounded">ID: ${player.id.substr(0,6)}</div>
                            </div>
                            <div class="text-xs text-slate-500">
                                Nato: ${player.data_nascita || 'N/D'}
                            </div>
                        `;
                        
                        grid.appendChild(card);
                        log(`Card aggiunta per ${player.cognome}`, 'success');
                        
                    } catch (cardError) {
                        log(`ERRORE creazione card per ${player.id}: ${cardError.message}`, 'error');
                    }
                }
                
                log('=== FINE loadPlayers() - SUCCESS ===', 'success');
                
            } catch (error) {
                log(`ERRORE CRITICO loadPlayers: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
                grid.innerHTML = `<div class="col-span-3 text-center py-12 text-red-400">
                    <strong>Errore caricamento:</strong><br>${error.message}<br>
                    <button onclick="loadPlayers()" class="mt-4 px-4 py-2 bg-cyan-500/20 text-cyan-400 rounded">Riprova</button>
                </div>`;
            }
            
            lucide.createIcons();
        }

        function forceReload() {
            allPlayers = [];
            loadPlayers();
        }

        document.getElementById('addPlayerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            try {
                const newPlayer = {
                    nome: document.getElementById('newNome').value.trim(),
                    cognome: document.getElementById('newCognome').value.trim(),
                    data_nascita: document.getElementById('newDataNascita').value,
                    categoria: document.getElementById('newCategoria').value,
                    ruolo: document.getElementById('newRuolo').value,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                log('Aggiunta giocatore: ' + JSON.stringify(newPlayer));
                await db.collection('giocatori').add(newPlayer);
                
                alert('Giocatore aggiunto!');
                e.target.reset();
                loadPlayers();
                
            } catch (error) {
                log('ERRORE aggiunta: ' + error.message, 'error');
                alert('Errore: ' + error.message);
            }
        });

        // Inizializza
        lucide.createIcons();
        log('Pagina caricata. In attesa di autenticazione...');
    </script>
</body>
</html>
