<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Allenatore - S.I.N.C.R.O.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;600;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .input-field {
            @apply w-full px-4 py-2 bg-slate-800/50 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none transition-colors;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    
    <!-- Header -->
    <nav class="glass-panel border-b border-slate-700/50 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center">
                        <i data-lucide="activity" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="font-display font-bold text-xl">S.I.N.C.R.O. <span class="text-slate-400 font-normal">| Area Staff</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="userName" class="text-sm text-slate-400"></span>
                    <button onclick="logout()" class="text-red-400 hover:text-red-300 text-sm flex items-center gap-1">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        Esci
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- Welcome -->
        <div class="mb-8">
            <h1 class="font-display text-3xl font-bold mb-2">Benvenuto, <span id="welcomeName">Allenatore</span></h1>
            <p class="text-slate-400">Inserisci i dati delle valutazioni giornaliere</p>
        </div>

        <!-- Quick Actions -->
        <div class="grid md:grid-cols-3 gap-6 mb-8">
            <button onclick="showSection('nuova-valutazione')" 
                class="glass-panel p-6 rounded-2xl border border-cyan-500/30 hover:border-cyan-500/60 transition-all text-left group">
                <div class="w-12 h-12 rounded-xl bg-cyan-500/20 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <i data-lucide="plus-circle" class="w-6 h-6 text-cyan-400"></i>
                </div>
                <h3 class="font-bold text-lg mb-1">Nuova Valutazione</h3>
                <p class="text-sm text-slate-400">Inserisci dati tecnici, cognitivi o fisici</p>
            </button>

            <button onclick="showSection('lista-giocatori')"
                class="glass-panel p-6 rounded-2xl border border-slate-700 hover:border-slate-500 transition-all text-left group">
                <div class="w-12 h-12 rounded-xl bg-slate-700/50 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <i data-lucide="users" class="w-6 h-6 text-slate-400"></i>
                </div>
                <h3 class="font-bold text-lg mb-1">Lista Giocatori</h3>
                <p class="text-sm text-slate-400">Visualizza anagrafiche</p>
            </button>

            <button onclick="showSection('storico')"
                class="glass-panel p-6 rounded-2xl border border-slate-700 hover:border-slate-500 transition-all text-left group">
                <div class="w-12 h-12 rounded-xl bg-slate-700/50 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <i data-lucide="history" class="w-6 h-6 text-slate-400"></i>
                </div>
                <h3 class="font-bold text-lg mb-1">Storico Valutazioni</h3>
                <p class="text-sm text-slate-400">Visualizza dati inseriti</p>
            </button>
        </div>

        <!-- Section: Nuova Valutazione -->
        <div id="nuova-valutazione" class="space-y-6">
            
            <!-- Step 1: Seleziona Giocatore -->
            <div class="glass-panel rounded-2xl p-6 border border-slate-700">
                <h2 class="font-display text-xl font-bold mb-4 flex items-center gap-2">
                    <span class="w-8 h-8 rounded-full bg-cyan-500/20 text-cyan-400 flex items-center justify-center text-sm">1</span>
                    Seleziona Giocatore
                </h2>
                
                <div class="grid md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Categoria</label>
                        <select id="filterCategoria" onchange="loadGiocatori()" class="input-field">
                            <option value="">Tutte</option>
                            <option value="E1">Esordienti 1° anno</option>
                            <option value="E2">Esordienti 2° anno</option>
                            <option value="G1">Giovanissimi 1° anno</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-300 mb-2">Giocatore</label>
                        <select id="selectGiocatore" class="input-field" required>
                            <option value="">Seleziona un giocatore...</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Step 2: Tipo Valutazione -->
            <div class="glass-panel rounded-2xl p-6 border border-slate-700">
                <h2 class="font-display text-xl font-bold mb-4 flex items-center gap-2">
                    <span class="w-8 h-8 rounded-full bg-cyan-500/20 text-cyan-400 flex items-center justify-center text-sm">2</span>
                    Tipo di Valutazione
                </h2>
                
                <div class="grid md:grid-cols-4 gap-4">
                    <button onclick="setTipoValutazione('tecnica')" id="btn-tecnica" 
                        class="p-4 rounded-xl border border-slate-600 hover:border-cyan-500/50 transition-all text-center">
                        <i data-lucide="target" class="w-8 h-8 text-cyan-400 mx-auto mb-2"></i>
                        <div class="font-semibold">Tecnica</div>
                        <div class="text-xs text-slate-400">The Lab</div>
                    </button>
                    
                    <button onclick="setTipoValutazione('cognitiva')" id="btn-cognitiva"
                        class="p-4 rounded-xl border border-slate-600 hover:border-purple-500/50 transition-all text-center">
                        <i data-lucide="brain" class="w-8 h-8 text-purple-400 mx-auto mb-2"></i>
                        <div class="font-semibold">Cognitiva</div>
                        <div class="text-xs text-slate-400">Match Court</div>
                    </button>
                    
                    <button onclick="setTipoValutazione('fisica')" id="btn-fisica"
                        class="p-4 rounded-xl border border-slate-600 hover:border-green-500/50 transition-all text-center">
                        <i data-lucide="activity" class="w-8 h-8 text-green-400 mx-auto mb-2"></i>
                        <div class="font-semibold">Fisica</div>
                        <div class="text-xs text-slate-400">Performance</div>
                    </button>
                    
                    <button onclick="setTipoValutazione('psicologica')" id="btn-psicologica"
                        class="p-4 rounded-xl border border-slate-600 hover:border-pink-500/50 transition-all text-center">
                        <i data-lucide="heart" class="w-8 h-8 text-pink-400 mx-auto mb-2"></i>
                        <div class="font-semibold">Psicologica</div>
                        <div class="text-xs text-slate-400">Comportamento</div>
                    </button>
                </div>
            </div>

            <!-- Step 3: Form Dati -->
            <div id="formContainer" class="hidden glass-panel rounded-2xl p-6 border border-slate-700">
                <h2 class="font-display text-xl font-bold mb-4 flex items-center gap-2">
                    <span class="w-8 h-8 rounded-full bg-cyan-500/20 text-cyan-400 flex items-center justify-center text-sm">3</span>
                    Inserisci Dati
                </h2>
                
                <form id="valutazioneForm" class="space-y-6">
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">Data Valutazione</label>
                            <input type="date" id="dataValutazione" required class="input-field">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">Sessione</label>
                            <select id="sessione" class="input-field">
                                <option value="A">Match Court A</option>
                                <option value="B">Match Court B</option>
                                <option value="Lab">The Lab</option>
                                <option value="Performance">Performance</option>
                            </select>
                        </div>
                    </div>

                    <div id="dynamicFields" class="space-y-4"></div>

                    <div class="pt-4 border-t border-slate-700">
                        <label class="block text-sm font-medium text-slate-300 mb-2">Note Generali</label>
                        <textarea id="note" rows="3" class="input-field" placeholder="Osservazioni specifiche..."></textarea>
                    </div>

                    <div class="flex gap-4">
                        <button type="submit" 
                            class="flex-1 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold rounded-xl hover:opacity-90 transition-opacity">
                            Salva Valutazione
                        </button>
                        <button type="button" onclick="resetForm()"
                            class="px-6 py-3 border border-slate-600 text-slate-300 rounded-xl hover:border-slate-400 transition-colors">
                            Annulla
                        </button>
                    </div>
                </form>
            </div>

            <div id="successMessage" class="hidden bg-green-500/20 border border-green-500/50 text-green-400 p-4 rounded-xl text-center">
                <i data-lucide="check-circle" class="w-6 h-6 inline mr-2"></i>
                Valutazione salvata con successo!
            </div>
        </div>

        <!-- Section: Lista Giocatori -->
        <div id="lista-giocatori" class="hidden">
            <div class="glass-panel rounded-2xl p-6 border border-slate-700">
                <h2 class="font-display text-xl font-bold mb-6">Lista Giocatori</h2>
                <div id="playersList" class="space-y-2">
                    <p class="text-slate-400 text-center py-8">Caricamento...</p>
                </div>
            </div>
        </div>

        <!-- Section: Storico -->
        <div id="storico" class="hidden">
            <div class="glass-panel rounded-2xl p-6 border border-slate-700">
                <h2 class="font-display text-xl font-bold mb-6">Ultime Valutazioni Inserite</h2>
                <div id="storicoList" class="space-y-3">
                    <p class="text-slate-400 text-center py-8">Caricamento...</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 🔥 CONFIGURAZIONE FIREBASE - LE TUE CREDENZIALI
        const firebaseConfig = {
            apiKey: "AIzaSyAlksSPuBgbYgzZmtUk3jYJMMtXEBCgM94",
            authDomain: "sincro-academy.firebaseapp.com",
            projectId: "sincro-academy",
            storageBucket: "sincro-academy.firebasestorage.app",
            messagingSenderId: "139698272933",
            appId: "1:139698272933:web:c4307e00b69757766beb4c",
            measurementId: "G-CD4QB2ZXRS"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let tipoValutazioneCorrente = null;

        // Verifica autenticazione
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;
            
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists) {
                const userData = userDoc.data();
                document.getElementById('userName').textContent = userData.name;
                document.getElementById('welcomeName').textContent = userData.name;
            }
            
            loadGiocatori();
            loadStorico();
            loadPlayersList();
        });

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }

        function showSection(sectionId) {
            ['nuova-valutazione', 'lista-giocatori', 'storico'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(sectionId).classList.remove('hidden');
        }

        async function loadGiocatori() {
            const categoria = document.getElementById('filterCategoria').value;
            const select = document.getElementById('selectGiocatore');
            
            let query = db.collection('giocatori').orderBy('cognome');
            if (categoria) {
                query = query.where('categoria', '==', categoria);
            }
            
            const snapshot = await query.get();
            select.innerHTML = '<option value="">Seleziona un giocatore...</option>';
            
            snapshot.forEach(doc => {
                const g = doc.data();
                select.innerHTML += `<option value="${doc.id}">${g.cognome} ${g.nome} (${g.categoria})</option>`;
            });
        }

        async function loadPlayersList() {
            const snapshot = await db.collection('giocatori').orderBy('cognome').get();
            const container = document.getElementById('playersList');
            
            if (snapshot.empty) {
                container.innerHTML = '<p class="text-slate-400 text-center py-8">Nessun giocatore inserito</p>';
                return;
            }
            
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const g = doc.data();
                container.innerHTML += `
                    <div class="p-4 bg-slate-800/30 rounded-xl border border-slate-700 flex justify-between items-center">
                        <div>
                            <div class="font-semibold text-white">${g.cognome} ${g.nome}</div>
                            <div class="text-sm text-slate-400">${g.categoria} • ${g.ruolo}</div>
                        </div>
                        <span class="text-xs text-slate-500">${g.data_nascita}</span>
                    </div>
                `;
            });
        }

        function setTipoValutazione(tipo) {
            tipoValutazioneCorrente = tipo;
            
            ['tecnica', 'cognitiva', 'fisica', 'psicologica'].forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                btn.classList.remove('border-cyan-500', 'bg-cyan-500/10');
                btn.classList.add('border-slate-600');
            });
            
            const btnSelected = document.getElementById(`btn-${tipo}`);
            btnSelected.classList.remove('border-slate-600');
            btnSelected.classList.add('border-cyan-500', 'bg-cyan-500/10');
            
            document.getElementById('formContainer').classList.remove('hidden');
            generateFields(tipo);
        }

        function generateFields(tipo) {
            const container = document.getElementById('dynamicFields');
            container.innerHTML = '';
            
            const fields = {
                tecnica: [
                    { name: 'controllo_1vs1', label: 'Controllo 1vs1', type: 'range', min: 1, max: 10 },
                    { name: 'passaggio_corto', label: 'Passaggio Corto', type: 'range', min: 1, max: 10 },
                    { name: 'passaggio_lungo', label: 'Passaggio Lungo', type: 'range', min: 1, max: 10 },
                    { name: 'tiro', label: 'Tiro', type: 'range', min: 1, max: 10 },
                    { name: 'dribbling', label: 'Dribbling', type: 'range', min: 1, max: 10 }
                ],
                cognitiva: [
                    { name: 'tempo_decisione', label: 'Tempo Decisione (sec)', type: 'number', step: 0.1 },
                    { name: 'decisioni_corrette', label: 'Decisioni Corrette %', type: 'number', min: 0, max: 100 },
                    { name: 'percezione_spaziale', label: 'Percezione Spaziale', type: 'range', min: 1, max: 10 },
                    { name: 'adattabilita', label: 'Adattabilità Tattica', type: 'range', min: 1, max: 10 }
                ],
                fisica: [
                    { name: 'sprint_20m', label: 'Sprint 20m (sec)', type: 'number', step: 0.01 },
                    { name: 'agilita', label: 'Agilità (sec)', type: 'number', step: 0.1 },
                    { name: 'salto_verticale', label: 'Salto Verticale (cm)', type: 'number' },
                    { name: 'resistenza', label: 'Resistenza (1-10)', type: 'range', min: 1, max: 10 }
                ],
                psicologica: [
                    { name: 'resilienza', label: 'Resilienza', type: 'range', min: 1, max: 10 },
                    { name: 'motivazione', label: 'Motivazione', type: 'range', min: 1, max: 10 },
                    { name: 'concentrazione', label: 'Concentrazione', type: 'range', min: 1, max: 10 },
                    { name: 'spirito_squadra', label: 'Spirito di Squadra', type: 'range', min: 1, max: 10 }
                ]
            };
            
            fields[tipo].forEach(field => {
                const div = document.createElement('div');
                if (field.type === 'range') {
                    div.innerHTML = `
                        <label class="block text-sm font-medium text-slate-300 mb-2">${field.label}</label>
                        <div class="flex items-center gap-4">
                            <input type="range" name="${field.name}" min="${field.min}" max="${field.max}" value="5" 
                                class="flex-1 h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-cyan-500"
                                oninput="this.nextElementSibling.textContent = this.value">
                            <span class="w-8 text-center font-bold text-cyan-400">5</span>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <label class="block text-sm font-medium text-slate-300 mb-2">${field.label}</label>
                        <input type="${field.type}" name="${field.name}" step="${field.step || ''}" 
                            class="w-full px-4 py-2 bg-slate-800/50 border border-slate-600 rounded-lg text-white focus:border-cyan-500 focus:outline-none">
                    `;
                }
                container.appendChild(div);
            });
        }

        document.getElementById('valutazioneForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const giocatoreId = document.getElementById('selectGiocatore').value;
            if (!giocatoreId) {
                alert('Seleziona un giocatore');
                return;
            }
            
            const formData = {
                giocatore_id: giocatoreId,
                allenatore_id: currentUser.uid,
                data: document.getElementById('dataValutazione').value,
                sessione: document.getElementById('sessione').value,
                tipo: tipoValutazioneCorrente,
                note: document.getElementById('note').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            const inputs = document.getElementById('dynamicFields').querySelectorAll('input');
            inputs.forEach(input => {
                formData[input.name] = input.type === 'number' ? parseFloat(input.value) : parseInt(input.value);
            });
            
            try {
                await db.collection('valutazioni').add(formData);
                
                document.getElementById('successMessage').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('successMessage').classList.add('hidden');
                    resetForm();
                }, 3000);
                
                loadStorico();
            } catch (error) {
                alert('Errore nel salvataggio: ' + error.message);
            }
        });

        function resetForm() {
            document.getElementById('valutazioneForm').reset();
            document.getElementById('formContainer').classList.add('hidden');
            tipoValutazioneCorrente = null;
            ['tecnica', 'cognitiva', 'fisica', 'psicologica'].forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                btn.classList.remove('border-cyan-500', 'bg-cyan-500/10');
                btn.classList.add('border-slate-600');
            });
        }

        async function loadStorico() {
            const snapshot = await db.collection('valutazioni')
                .where('allenatore_id', '==', currentUser.uid)
                .orderBy('timestamp', 'desc')
                .limit(10)
                .get();
            
            const container = document.getElementById('storicoList');
            container.innerHTML = '';
            
            if (snapshot.empty) {
                container.innerHTML = '<p class="text-slate-400 text-center py-8">Nessuna valutazione inserita</p>';
                return;
            }
            
            for (const doc of snapshot.docs) {
                const v = doc.data();
                const playerDoc = await db.collection('giocatori').doc(v.giocatore_id).get();
                const playerName = playerDoc.exists ? `${playerDoc.data().cognome} ${playerDoc.data().nome}` : 'Sconosciuto';
                
                container.innerHTML += `
                    <div class="p-4 bg-slate-800/30 rounded-xl border border-slate-700 flex justify-between items-center">
                        <div>
                            <div class="font-semibold text-white">${playerName}</div>
                            <div class="text-sm text-slate-400 capitalize">${v.tipo} • ${v.data} • ${v.sessione}</div>
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs bg-cyan-500/20 text-cyan-400">
                            ${new Date(v.timestamp?.toDate()).toLocaleDateString()}
                        </span>
                    </div>
                `;
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
