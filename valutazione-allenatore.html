<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valutazione Giocatori - Allenatore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;600;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #334155;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #06b6d4;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    
    <nav class="glass-panel border-b border-slate-700/50 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center">
                        <i data-lucide="activity" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="font-display font-bold text-xl">S.I.N.C.R.O. <span class="text-cyan-400">ALLENATORE</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="userName" class="text-sm text-slate-400"></span>
                    <span id="userCategory" class="text-xs bg-cyan-500/20 text-cyan-400 px-2 py-1 rounded"></span>
                    <button onclick="logout()" class="text-red-400 hover:text-red-300 text-sm flex items-center gap-1">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- Selezione Giocatore -->
        <div id="selezioneGiocatore" class="glass-panel p-6 rounded-2xl border border-slate-700 mb-6">
            <h2 class="text-xl font-bold mb-4">Seleziona Giocatore</h2>
            <div id="listaGiocatori" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="col-span-3 text-center py-8 text-slate-400">Caricamento giocatori...</div>
            </div>
        </div>

        <!-- Form Valutazione (nascosto all'inizio) -->
        <div id="formValutazione" class="hidden glass-panel p-6 rounded-2xl border border-slate-700">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-bold">Valutazione Tecnica</h2>
                    <p id="nomeGiocatoreSelezionato" class="text-cyan-400"></p>
                </div>
                <button onclick="tornaAllaLista()" class="text-slate-400 hover:text-white">
                    <i data-lucide="arrow-left" class="w-5 h-5 inline mr-1"></i> Torna indietro
                </button>
            </div>

            <form id="valutazioneForm" class="space-y-6">
                
                <!-- Data -->
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Data Valutazione</label>
                    <input type="date" id="dataValutazione" required 
                        class="px-4 py-2 bg-slate-800 rounded-lg border border-slate-600 text-white w-full md:w-auto">
                </div>

                <!-- OBIETTIVI TECNICI (placeholder - da definire) -->
                <div class="border-t border-slate-700 pt-6">
                    <h3 class="font-semibold mb-4 text-yellow-400">Obiettivi Tecnici (da definire)</h3>
                    
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="block text-sm">Controllo palla</label>
                            <input type="range" name="controllo_palla" min="1" max="10" value="5" 
                                oninput="document.getElementById('val-controllo').textContent = this.value">
                            <div class="flex justify-between text-xs text-slate-500">
                                <span>1</span>
                                <span id="val-controllo" class="text-cyan-400 font-bold">5</span>
                                <span>10</span>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm">Passaggio</label>
                            <input type="range" name="passaggio" min="1" max="10" value="5"
                                oninput="document.getElementById('val-passaggio').textContent = this.value">
                            <div class="flex justify-between text-xs text-slate-500">
                                <span>1</span>
                                <span id="val-passaggio" class="text-cyan-400 font-bold">5</span>
                                <span>10</span>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm">Tiro</label>
                            <input type="range" name="tiro" min="1" max="10" value="5"
                                oninput="document.getElementById('val-tiro').textContent = this.value">
                            <div class="flex justify-between text-xs text-slate-500">
                                <span>1</span>
                                <span id="val-tiro" class="text-cyan-400 font-bold">5</span>
                                <span>10</span>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm">Velocità</label>
                            <input type="range" name="velocita" min="1" max="10" value="5"
                                oninput="document.getElementById('val-velocita').textContent = this.value">
                            <div class="flex justify-between text-xs text-slate-500">
                                <span>1</span>
                                <span id="val-velocita" class="text-cyan-400 font-bold">5</span>
                                <span>10</span>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm">Resistenza</label>
                            <input type="range" name="resistenza" min="1" max="10" value="5"
                                oninput="document.getElementById('val-resistenza').textContent = this.value">
                            <div class="flex justify-between text-xs text-slate-500">
                                <span>1</span>
                                <span id="val-resistenza" class="text-cyan-400 font-bold">5</span>
                                <span>10</span>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm">Posizionamento</label>
                            <input type="range" name="posizionamento" min="1" max="10" value="5"
                                oninput="document.getElementById('val-posizionamento').textContent = this.value">
                            <div class="flex justify-between text-xs text-slate-500">
                                <span>1</span>
                                <span id="val-posizionamento" class="text-cyan-400 font-bold">5</span>
                                <span>10</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Note -->
                <div class="border-t border-slate-700 pt-6">
                    <label class="block text-sm text-slate-400 mb-2">Note</label>
                    <textarea id="note" rows="3" 
                        class="w-full px-4 py-2 bg-slate-800 rounded-lg border border-slate-600 text-white"
                        placeholder="Osservazioni sul giocatore..."></textarea>
                </div>

                <!-- Pulsanti -->
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 py-3 bg-cyan-500 text-slate-900 rounded-lg font-bold hover:bg-cyan-400 transition-colors">
                        Salva Valutazione
                    </button>
                    <button type="button" onclick="tornaAllaLista()" class="px-6 py-3 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition-colors">
                        Annulla
                    </button>
                </div>
            </form>
        </div>

    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAlksSPuBgbYgzZmtUk3jYJMMtXEBCgM94",
            authDomain: "sincro-academy.firebaseapp.com",
            projectId: "sincro-academy",
            storageBucket: "sincro-academy.firebasestorage.app",
            messagingSenderId: "139698272933",
            appId: "1:139698272933:web:c4307e00b69757766beb4c",
            measurementId: "G-CD4QB2ZXRS"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let userCategory = null;
        let selectedPlayerId = null;

        // Auth check
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists || userDoc.data().role !== 'allenatore') {
                    alert('Accesso riservato agli allenatori');
                    await auth.signOut();
                    window.location.href = 'login.html';
                    return;
                }

                currentUser = user;
                userCategory = userDoc.data().categoria;
                
                document.getElementById('userName').textContent = userDoc.data().name || user.email;
                document.getElementById('userCategory').textContent = userCategory || 'N/D';
                
                // Imposta data odierna
                document.getElementById('dataValutazione').valueAsDate = new Date();
                
                loadGiocatori();
                
            } catch (error) {
                console.error('Errore auth:', error);
                alert('Errore di autenticazione');
            }
        });

        function logout() {
            auth.signOut().then(() => window.location.href = 'login.html');
        }

        async function loadGiocatori() {
            const container = document.getElementById('listaGiocatori');
            container.innerHTML = '<div class="col-span-3 text-center py-8 text-slate-400">Caricamento...</div>';

            try {
                // Carica giocatori della categoria dell'allenatore
                const snapshot = await db.collection('giocatori')
                    .where('categoria', '==', userCategory)
                    .get();

                if (snapshot.empty) {
                    container.innerHTML = '<div class="col-span-3 text-center py-8 text-slate-500">Nessun giocatore trovato nella tua categoria</div>';
                    return;
                }

                container.innerHTML = '';
                
                snapshot.forEach(doc => {
                    const g = doc.data();
                    const card = document.createElement('div');
                    card.className = 'glass-panel p-4 rounded-xl border border-slate-700 hover:border-cyan-500/50 cursor-pointer transition-all';
                    card.onclick = () => selezionaGiocatore(doc.id, g);
                    
                    card.innerHTML = `
                        <h3 class="font-bold text-lg">${g.cognome || ''} ${g.nome || ''}</h3>
                        <p class="text-sm text-slate-400">${g.ruolo || 'N/D'}</p>
                        <p class="text-xs text-slate-500 mt-2">${g.data_nascita || 'N/D'}</p>
                    `;
                    
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Errore:', error);
                container.innerHTML = `<div class="col-span-3 text-center py-8 text-red-400">Errore: ${error.message}</div>`;
            }
            
            lucide.createIcons();
        }

        function selezionaGiocatore(id, giocatore) {
            selectedPlayerId = id;
            document.getElementById('nomeGiocatoreSelezionato').textContent = `${giocatore.cognome} ${giocatore.nome}`;
            document.getElementById('selezioneGiocatore').classList.add('hidden');
            document.getElementById('formValutazione').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function tornaAllaLista() {
            selectedPlayerId = null;
            document.getElementById('valutazioneForm').reset();
            document.getElementById('formValutazione').classList.add('hidden');
            document.getElementById('selezioneGiocatore').classList.remove('hidden');
            
            // Reset valori slider
            document.querySelectorAll('input[type="range"]').forEach(slider => {
                slider.value = 5;
                const valId = 'val-' + slider.name;
                const valEl = document.getElementById(valId);
                if (valEl) valEl.textContent = '5';
            });
        }

        document.getElementById('valutazioneForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!selectedPlayerId) {
                alert('Seleziona un giocatore');
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.textContent = 'Salvataggio...';
            submitBtn.disabled = true;

            try {
                const valutazione = {
                    giocatore_id: selectedPlayerId,
                    allenatore_id: currentUser.uid,
                    allenatore_nome: document.getElementById('userName').textContent,
                    tipo: 'tecnica',
                    categoria: userCategory,
                    data: document.getElementById('dataValutazione').value,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    
                    // Valori tecnici
                    controllo_palla: parseInt(document.querySelector('[name="controllo_palla"]').value),
                    passaggio: parseInt(document.querySelector('[name="passaggio"]').value),
                    tiro: parseInt(document.querySelector('[name="tiro"]').value),
                    velocita: parseInt(document.querySelector('[name="velocita"]').value),
                    resistenza: parseInt(document.querySelector('[name="resistenza"]').value),
                    posizionamento: parseInt(document.querySelector('[name="posizionamento"]').value),
                    
                    note: document.getElementById('note').value
                };

                await db.collection('valutazioni').add(valutazione);
                
                alert('Valutazione salvata con successo!');
                tornaAllaLista();
                
            } catch (error) {
                console.error('Errore salvataggio:', error);
                alert('Errore durante il salvataggio: ' + error.message);
            } finally {
                submitBtn.textContent = 'Salva Valutazione';
                submitBtn.disabled = false;
            }
        });

        lucide.createIcons();
    </script>
</body>
</html>
