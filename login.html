<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - S.I.N.C.R.O. Staff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;600;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center mx-auto mb-4">
                <i data-lucide="activity" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="font-display text-3xl font-bold text-white">S.I.N.C.R.O.</h1>
            <p class="text-slate-400 mt-2">Accesso Riservato Staff Tecnico</p>
        </div>

        <!-- Login Box -->
        <div class="bg-slate-800/50 backdrop-blur-xl rounded-3xl p-8 border border-slate-700 shadow-2xl">
            
            <!-- Tabs -->
            <div class="flex mb-6 bg-slate-700/50 rounded-full p-1">
                <button onclick="switchTab('login')" id="tab-login" class="flex-1 py-2 rounded-full text-sm font-semibold transition-all bg-cyan-500 text-slate-900">
                    Accedi
                </button>
                <button onclick="switchTab('register')" id="tab-register" class="flex-1 py-2 rounded-full text-sm font-semibold transition-all text-slate-300 hover:text-white">
                    Registrati
                </button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
                    <input type="email" id="loginEmail" required
                        class="w-full px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none"
                        placeholder="allenatore@club.it">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input type="password" id="loginPassword" required
                        class="w-full px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none"
                        placeholder="••••••••">
                </div>
                <button type="submit" 
                    class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold rounded-xl hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
                    <i data-lucide="log-in" class="w-5 h-5"></i>
                    Accedi
                </button>
            </form>

            <!-- Register Form (Hidden) -->
            <form id="registerForm" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Nome Completo</label>
                    <input type="text" id="regName" required
                        class="w-full px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none"
                        placeholder="Mario Rossi">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
                    <input type="email" id="regEmail" required
                        class="w-full px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none"
                        placeholder="allenatore@club.it">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password (min 6 caratteri)</label>
                    <input type="password" id="regPassword" required minlength="6"
                        class="w-full px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none"
                        placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Ruolo</label>
                    <select id="regRole" required
                        class="w-full px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white focus:border-cyan-500 focus:outline-none">
                        <option value="">Seleziona ruolo</option>
                        <option value="allenatore">Allenatore</option>
                        <option value="preparatore">Preparatore Atletico</option>
                        <option value="psicologo">Psicologo</option>
                        <option value="admin">Amministratore</option>
                    </select>
                </div>
                <button type="submit" 
                    class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold rounded-xl hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
                    <i data-lucide="user-plus" class="w-5 h-5"></i>
                    Richiedi Accesso
                </button>
                <p class="text-xs text-slate-500 text-center">
                    * La registrazione deve essere approvata dall'amministratore
                </p>
            </form>

            <!-- Error/Success Messages -->
            <div id="message" class="mt-4 p-3 rounded-xl text-sm hidden"></div>
        </div>

        <div class="text-center mt-6">
            <a href="index.html" class="text-slate-400 hover:text-cyan-400 text-sm transition-colors">
                ← Torna alla presentazione
            </a>
        </div>
    </div>

    <script>
        // 🔥 CONFIGURAZIONE FIREBASE - LE TUE CREDENZIALI
        const firebaseConfig = {
            apiKey: "AIzaSyAlksSPuBgbYgzZmtUk3jYJMMtXEBCgM94",
            authDomain: "sincro-academy.firebaseapp.com",
            projectId: "sincro-academy",
            storageBucket: "sincro-academy.firebasestorage.app",
            messagingSenderId: "139698272933",
            appId: "1:139698272933:web:c4307e00b69757766beb4c",
            measurementId: "G-CD4QB2ZXRS"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // UI Functions
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabLogin.classList.add('bg-cyan-500', 'text-slate-900');
                tabLogin.classList.remove('text-slate-300');
                tabRegister.classList.remove('bg-cyan-500', 'text-slate-900');
                tabRegister.classList.add('text-slate-300');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabRegister.classList.add('bg-cyan-500', 'text-slate-900');
                tabRegister.classList.remove('text-slate-300');
                tabLogin.classList.remove('bg-cyan-500', 'text-slate-900');
                tabLogin.classList.add('text-slate-300');
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.classList.remove('hidden', 'bg-red-500/20', 'text-red-400', 'bg-green-500/20', 'text-green-400');
            
            if (type === 'error') {
                msg.classList.add('bg-red-500/20', 'text-red-400', 'border', 'border-red-500/50');
            } else {
                msg.classList.add('bg-green-500/20', 'text-green-400', 'border', 'border-green-500/50');
            }
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Verifica se utente è approvato
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    throw new Error('Utente non trovato nel database');
                }
                
                const userData = userDoc.data();
                
                if (!userData.approved) {
                    await auth.signOut();
                    throw new Error('Account in attesa di approvazione');
                }

                // Redirect based on role
                if (userData.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
                
            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Salva dati utente in Firestore (non approvato di default)
                await db.collection('users').doc(user.uid).set({
                    name: name,
                    email: email,
                    role: role,
                    approved: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                showMessage('Registrazione completata! Attendi approvazione.', 'success');
                
                await auth.signOut();
                
                setTimeout(() => {
                    switchTab('login');
                }, 2000);
                
            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        lucide.createIcons();
    </script>
</body>
</html>
