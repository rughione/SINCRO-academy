<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - S.I.N.C.R.O. Talent Forge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;600;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center">
    
    <div class="glass-panel p-8 rounded-2xl border border-slate-700 w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <h1 class="font-display text-2xl font-bold">S.I.N.C.R.O.</h1>
            <p class="text-slate-400 text-sm">Talent Forge System</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm text-slate-400 mb-1">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3 bg-slate-800 rounded-lg border border-slate-600 text-white focus:border-cyan-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 bg-slate-800 rounded-lg border border-slate-600 text-white focus:border-cyan-500 focus:outline-none">
            </div>
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-lg font-bold text-white hover:opacity-90 transition-opacity">
                Accedi
            </button>
        </form>

        <div id="errorMessage" class="mt-4 text-red-400 text-sm text-center hidden"></div>
        
        <div class="mt-6 text-center text-xs text-slate-500">
            <p>Accesso riservato al personale autorizzato</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlksSPuBgbYgzZmtUk3jYJMMtXEBCgM94",
            authDomain: "sincro-academy.firebaseapp.com",
            projectId: "sincro-academy",
            storageBucket: "sincro-academy.firebasestorage.app",
            messagingSenderId: "139698272933",
            appId: "1:139698272933:web:c4307e00b69757766beb4c",
            measurementId: "G-CD4QB2ZXRS"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Se già loggato, reindirizza
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                await redirectByRole(user.uid);
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                await redirectByRole(userCredential.user.uid);
            } catch (error) {
                errorDiv.textContent = 'Email o password non validi';
                errorDiv.classList.remove('hidden');
            }
        });

        async function redirectByRole(uid) {
            const userDoc = await db.collection('users').doc(uid).get();
            
            if (!userDoc.exists) {
                await auth.signOut();
                return;
            }
            
            const role = userDoc.data().role;
            
            switch(role) {
                case 'admin':
                    window.location.href = 'admin.html';
                    break;
                case 'allenatore':
                    window.location.href = 'valutazione-allenatore.html';
                    break;
                case 'psicologo':
                    window.location.href = 'valutazione-psicologo.html';
                    break;
                default:
                    await auth.signOut();
                    alert('Ruolo non riconosciuto');
            }
        }
    </script>
</body>
</html>
