<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - S.I.N.C.R.O. Talent Forge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;600;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center">
    
    <div class="glass-panel p-8 rounded-2xl border border-slate-700 w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <h1 class="font-display text-2xl font-bold">S.I.N.C.R.O.</h1>
            <p class="text-slate-400 text-sm">Talent Forge System</p>
        </div>

        <!-- TAB SWITCHER -->
        <div class="flex mb-6 bg-slate-800 rounded-lg p-1">
            <button onclick="showForm('login')" id="tab-login" class="flex-1 py-2 rounded-md text-sm font-medium bg-cyan-500 text-slate-900 transition-all">
                Accedi
            </button>
            <button onclick="showForm('register')" id="tab-register" class="flex-1 py-2 rounded-md text-sm font-medium text-slate-400 hover:text-white transition-all">
                Registrati
            </button>
        </div>

        <!-- FORM LOGIN -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm text-slate-400 mb-1">Email</label>
                <input type="email" id="loginEmail" required class="w-full px-4 py-3 bg-slate-800 rounded-lg border border-slate-600 text-white focus:border-cyan-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-1">Password</label>
                <input type="password" id="loginPassword" required class="w-full px-4 py-3 bg-slate-800 rounded-lg border border-slate-600 text-white focus:border-cyan-500 focus:outline-none">
            </div>
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-lg font-bold text-white hover:opacity-90 transition-opacity">
                Accedi
            </button>
        </form>

        <!-- FORM REGISTRAZIONE -->
        <form id="registerForm" class="space-y-4 hidden">
            <div>
                <label class="block text-sm text-slate-400 mb-1">Nome e Cognome</label>
                <input type="text" id="regName" required class="w-full px-4 py-3 bg-slate-800 rounded-lg border border-slate-600 text-white focus:border-cyan-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-1">Email</label>
                <input type="email" id="regEmail" required class="w-full px-4 py-3 bg-slate-800 rounded-lg border border-slate-600 text-white focus:border-cyan-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-1">Password (min 6 caratteri)</label>
                <input type="password" id="regPassword" required minlength="6" class="w-full px-4 py-3 bg-slate-800 rounded-lg border border-slate-600 text-white focus:border-cyan-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-1">Ruolo</label>
                <select id="regRole" required onchange="toggleCategoria()" class="w-full px-4 py-3 bg-slate-800 rounded-lg border border-slate-600 text-white focus:border-cyan-500 focus:outline-none">
                    <option value="">Seleziona ruolo</option>
                    <option value="allenatore">Allenatore</option>
                    <option value="psicologo">Psicologo dello Sport</option>
                </select>
            </div>
            <div id="categoriaField" class="hidden">
                <label class="block text-sm text-slate-400 mb-1">Categoria</label>
                <select id="regCategoria" class="w-full px-4 py-3 bg-slate-800 rounded-lg border border-slate-600 text-white focus:border-cyan-500 focus:outline-none">
                    <option value="">Seleziona categoria</option>
                    <option value="E1">Esordienti 1° (E1)</option>
                    <option value="E2">Esordienti 2° (E2)</option>
                    <option value="G1">Giovanissimi 1° (G1)</option>
                </select>
            </div>
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-green-500 to-emerald-600 rounded-lg font-bold text-white hover:opacity-90 transition-opacity">
                Richiedi Registrazione
            </button>
            <p class="text-xs text-slate-500 text-center">
                L'account dovrà essere approvato dall'amministratore
            </p>
        </form>

        <div id="errorMessage" class="mt-4 text-red-400 text-sm text-center hidden"></div>
        <div id="successMessage" class="mt-4 text-green-400 text-sm text-center hidden"></div>
        
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlksSPuBgbYgzZmtUk3jYJMMtXEBCgM94",
            authDomain: "sincro-academy.firebaseapp.com",
            projectId: "sincro-academy",
            storageBucket: "sincro-academy.firebasestorage.app",
            messagingSenderId: "139698272933",
            appId: "1:139698272933:web:c4307e00b69757766beb4c",
            measurementId: "G-CD4QB2ZXRS"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Se già loggato, reindirizza
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                await redirectByRole(user.uid);
            }
        });

        function showForm(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            
            if (type === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabLogin.classList.add('bg-cyan-500', 'text-slate-900');
                tabLogin.classList.remove('text-slate-400');
                tabRegister.classList.remove('bg-cyan-500', 'text-slate-900');
                tabRegister.classList.add('text-slate-400');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabRegister.classList.add('bg-cyan-500', 'text-slate-900');
                tabRegister.classList.remove('text-slate-400');
                tabLogin.classList.remove('bg-cyan-500', 'text-slate-900');
                tabLogin.classList.add('text-slate-400');
            }
            
            hideMessages();
        }

        function toggleCategoria() {
            const role = document.getElementById('regRole').value;
            const catField = document.getElementById('categoriaField');
            const catSelect = document.getElementById('regCategoria');
            
            if (role === 'allenatore') {
                catField.classList.remove('hidden');
                catSelect.required = true;
            } else {
                catField.classList.add('hidden');
                catSelect.required = false;
                catSelect.value = '';
            }
        }

        function hideMessages() {
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        }

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMessage');
            el.textContent = msg;
            el.classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
        }

        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                await redirectByRole(userCredential.user.uid);
            } catch (error) {
                showError('Email o password non validi');
            }
        });

        // REGISTRAZIONE
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            const categoria = document.getElementById('regCategoria').value;
            
            if (!role) {
                showError('Seleziona un ruolo');
                return;
            }
            
            if (role === 'allenatore' && !categoria) {
                showError('Seleziona una categoria');
                return;
            }
            
            try {
                // Crea utente in Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const uid = userCredential.user.uid;
                
                // Salva dati in Firestore (non approvato)
                const userData = {
                    name: name,
                    email: email,
                    role: role,
                    approved: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                if (role === 'allenatore') {
                    userData.categoria = categoria;
                }
                
                await db.collection('users').doc(uid).set(userData);
                
                // Logout immediato (deve essere approvato)
                await auth.signOut();
                
                showSuccess('Registrazione inviata! Attendi approvazione dall\'amministratore.');
                
                // Reset form
                document.getElementById('registerForm').reset();
                document.getElementById('categoriaField').classList.add('hidden');
                
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/email-already-in-use') {
                    showError('Email già registrata');
                } else if (error.code === 'auth/weak-password') {
                    showError('Password troppo debole (min 6 caratteri)');
                } else {
                    showError('Errore: ' + error.message);
                }
            }
        });

        async function redirectByRole(uid) {
            const userDoc = await db.collection('users').doc(uid).get();
            
            if (!userDoc.exists) {
                await auth.signOut();
                showError('Utente non trovato');
                return;
            }
            
            const userData = userDoc.data();
            
            if (!userData.approved) {
                await auth.signOut();
                showError('Account in attesa di approvazione');
                return;
            }
            
            const role = userData.role;
            
            switch(role) {
                case 'admin':
                    window.location.href = 'admin.html';
                    break;
                case 'allenatore':
                    window.location.href = 'valutazione-allenatore.html';
                    break;
                case 'psicologo':
                    window.location.href = 'valutazione-psicologo.html';
                    break;
                default:
                    await auth.signOut();
                    showError('Ruolo non riconosciuto');
            }
        }
    </script>
</body>
</html>
